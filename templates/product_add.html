{% extends "base.html" %}
{% block page_title %}إضافة منتج{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-2xl mx-auto">
    <h2 class="text-lg font-bold text-gray-700 mb-6">
        <i class="fas fa-plus text-blue-500 ml-2"></i>
        إضافة منتج جديد
    </h2>

    <form action="{{ url_for('productPageaddSave') }}" method="POST">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

            <div>
                <label class="form-label">اسم المنتج</label>
                <input type="text" name="name" class="form-input" placeholder="مثال: لاب توب" required>
            </div>

            <div>
                <label class="form-label">الفئة</label>
                <select name="category_id" class="form-select" required>
                    <option value="">-- اختر الفئة --</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="form-label">سعر البيع</label>
                <input type="number" step="0.01" name="price_for_sale"
                       class="form-input" placeholder="0.00" required>
            </div>

            <div>
                <label class="form-label">سعر الشراء</label>
                <input type="number" step="0.01" name="price_for_buy"
                       class="form-input" placeholder="0.00" required>
            </div>

            <div>
                <label class="form-label">الوحدة</label>
                <input type="text" name="unit" class="form-input" placeholder="مثال: قطعة، كيلو، متر" required>
            </div>

            <div>
                <label class="form-label">الحد الأدنى للكمية</label>
                <input type="number" name="min_quantity"
                       class="form-input" placeholder="0" required>
            </div>

            <div class="sm:col-span-2">
                <label class="form-label">اسم صورة المنتج</label>
                <input type="text" name="photo_url" class="form-input"
                       placeholder="مثال: laptop.jpg">
                <p class="text-xs text-gray-400 mt-1">
                    <i class="fas fa-info-circle ml-1"></i>
                    حط الصورة في مجلد: static/images/products/
                </p>
            </div>

        </div>

        <div class="flex gap-3 mt-6">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> حفظ المنتج
            </button>
            <a href="{{ url_for('productPage') }}" class="btn btn-ghost">
                <i class="fas fa-arrow-right"></i> رجوع
            </a>
        </div>
    </form>
</div>
{% endblock %}
