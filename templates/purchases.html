{% extends 'base.html' %}

{% block content %}

<h2>المشتريات</h2>

<!-- فورم إضافة مشتريات -->
<form method="POST" action="{{ url_for('purchasesPageadd') }}">

    <select name="product_id" required>
        <option value="">اختر المنتج</option>
        {% for p in products %}
            <option value="{{ p.id }}">{{ p.name }}</option>
        {% endfor %}
    </select>

    <select name="supplier_id" required>
        <option value="">اختر المورد</option>
        {% for s in suppliers %}
            <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
    </select>

    <input type="number" name="quantity" placeholder="الكمية" required>

    <button type="submit">إضافة مشتريات</button>
</form>

<hr>

<!-- جدول المشتريات -->
<table border="1">
    <tr>
        <th>المنتج</th>
        <th>المورد</th>
        <th>الكمية</th>
        <th>التكلفة</th>
    </tr>

    {% for p in purchases %}
    <tr>
        <td>{{ p.product_name }}</td>
        <td>{{ p.supplier_name }}</td>
        <td>{{ p.quantity }}</td>
        <td>{{ p.total_cost }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
