<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StockPro{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        {% include 'static/style.css' %}
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navbar -->
    <nav class="bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <i class="fas fa-box-open text-2xl mr-2"></i>
                    <span class="text-xl font-bold">StockPro</span>
                </div>
                <div class="hidden md:flex items-center space-x-reverse space-x-6">
                    <a href="{{ url_for('dashboard') }}" class="hover:text-blue-200 transition-colors">
                        <i class="fas fa-tachometer-alt mr-1"></i>لوحة التحكم
                    </a>
                    <a href="{{ url_for('products') }}" class="hover:text-blue-200 transition-colors">
                        <i class="fas fa-cubes mr-1"></i>المنتجات
                    </a>
                    <a href="{{ url_for('suppliers') }}" class="hover:text-blue-200 transition-colors">
                        <i class="fas fa-truck mr-1"></i>الموردون
                    </a>
                    <a href="{{ url_for('customers') }}" class="hover:text-blue-200 transition-colors">
                        <i class="fas fa-users mr-1"></i>العملاء
                    </a>
                    <a href="{{ url_for('sales') }}" class="hover:text-blue-200 transition-colors">
                        <i class="fas fa-shopping-cart mr-1"></i>المبيعات
                    </a>
                    <a href="{{ url_for('reports') }}" class="hover:text-blue-200 transition-colors">
                        <i class="fas fa-chart-bar mr-1"></i>التقارير
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-8">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-6 mt-12">
        <div class="container mx-auto px-4">
            <div class="text-center">
                <p>&copy; 2024 StockPro. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </footer>
</body>
</html>
