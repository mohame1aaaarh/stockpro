{% extends "base.html" %}
{% block page_title %}تعديل منتج{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-2xl mx-auto">
    <h2 class="text-lg font-bold text-gray-700 mb-6">
        <i class="fas fa-edit text-blue-500 ml-2"></i>
        تعديل: {{ product.name }}
    </h2>

    <form action="{{ url_for('product_edit_save', id=product.id) }}" method="POST">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

            <div>
                <label class="form-label">اسم المنتج</label>
                <input type="text" name="name" class="form-input" value="{{ product.name }}" required>
            </div>

            <div>
                <label class="form-label">الفئة</label>
                <select name="category_id" class="form-select" required>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}"
                        {% if cat.id == product.category_id %}selected{% endif %}>
                        {{ cat.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="form-label">سعر البيع</label>
                <input type="number" step="0.01" name="price_for_sale"
                       class="form-input" value="{{ product.price_for_sale }}" required>
            </div>

            <div>
                <label class="form-label">سعر الشراء</label>
                <input type="number" step="0.01" name="price_for_buy"
                       class="form-input" value="{{ product.price_for_buy }}" required>
            </div>

            <div>
                <label class="form-label">الوحدة</label>
                <input type="text" name="unit" class="form-input" value="{{ product.unit }}" required>
            </div>

            <div>
                <label class="form-label">الحد الأدنى للكمية</label>
                <input type="number" name="min_quantity"
                       class="form-input" value="{{ product.min_quantity }}" required>
            </div>

        </div>

        <div class="flex gap-3 mt-6">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> حفظ التعديلات
            </button>
            <a href="{{ url_for('product_page') }}" class="btn btn-ghost">
                <i class="fas fa-arrow-right"></i> رجوع
            </a>
        </div>
    </form>
</div>
{% endblock %}
